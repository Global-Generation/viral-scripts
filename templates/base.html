<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Viral Scripts{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23e6435b'/%3E%3Cpath d='M10 8l12 8-12 8V8z' fill='white'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="h-full font-sans" style="background: #f8fafc;">
    <!-- Mobile header -->
    <div class="mobile-header fixed top-0 left-0 right-0 z-30 bg-white border-b border-slate-200 px-4 h-14 items-center gap-3 lg:hidden">
        <button onclick="toggleSidebar()" class="p-1 -ml-1 text-gray-600">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-semibold text-sm text-gray-900">Viral Scripts</span>
    </div>
    <!-- Sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="closeSidebar()"></div>

    <div class="flex h-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-section-label">Schedule</div>
                <a href="/videos" class="nav-link {% if active_page == 'videos' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span>Videos & Schedule</span>
                </a>

                <div class="nav-section-label">Content Farm</div>
                <a href="/character/daniel" class="nav-link {% if active_page == 'char_daniel' %}active{% endif %}">
                    <img src="/static/avatars/daniel.png" style="width: 30px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0;">
                    Daniel
                </a>
                <a href="/character/boris" class="nav-link {% if active_page == 'char_boris' %}active{% endif %}">
                    <img src="/static/avatars/boris.png" style="width: 30px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0;">
                    Boris
                </a>
                <a href="/character/thomas" class="nav-link {% if active_page == 'char_thomas' %}active{% endif %}">
                    <img src="/static/avatars/thomas.png" style="width: 30px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0;">
                    Thomas
                </a>
                <a href="/nari" class="nav-link {% if active_page == 'nari' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Sophia - Nari
                </a>
                <a href="/anna" class="nav-link {% if active_page == 'anna' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Ava - Anna
                </a>

                <div class="nav-section-label">Library</div>
                <a href="/scripts" class="nav-link {% if active_page == 'scripts' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span>Scripts Library</span>
                </a>
                <a href="/presets" class="nav-link {% if active_page == 'presets' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    <span>Presets</span>
                </a>

                <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}" style="margin-top: auto;">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span>API Keys & Usage</span>
                </a>

            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto pt-14 lg:pt-0">
            <div class="max-w-7xl mx-auto px-4 py-4 lg:px-6 lg:py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    document.querySelectorAll('.sidebar .nav-link').forEach(function(link) {
        link.addEventListener('click', function() { if (window.innerWidth < 1024) closeSidebar(); });
    });
    </script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
