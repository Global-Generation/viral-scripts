<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Viral Scripts{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0f'/%3E%3Cpath d='M10 8l12 8-12 8V8z' fill='%2300ff88'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="h-full font-sans" style="background: #0a0a0f;">
    <!-- Mobile header -->
    <div class="mobile-header fixed top-0 left-0 right-0 z-30 px-4 h-14 items-center gap-3 lg:hidden" style="background: #0d0d14; border-bottom: 1px solid rgba(0,255,136,0.1);">
        <button onclick="toggleSidebar()" class="p-1 -ml-1" style="color: #00ff88;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-semibold text-sm" style="color: #ffffff;">Viral Scripts</span>
    </div>
    <!-- Sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden" onclick="closeSidebar()"></div>

    <div class="flex h-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M10 8l12 8-12 8V8z" fill="white"/></svg>
                </div>
                <div>
                    <div class="sidebar-logo-title">Viral Scripts</div>
                    <div class="sidebar-logo-sub">TikTok Script Analyzer</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>
                <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Search
                </a>
                <a href="/scripts" class="nav-link {% if active_page == 'scripts' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Scripts Library
                </a>

                <div class="nav-section-label">Settings</div>
                <a href="/presets" class="nav-link {% if active_page == 'presets' %}active{% endif %}">
                    <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    Presets
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto pt-14 lg:pt-0">
            <div class="max-w-7xl mx-auto px-4 py-4 lg:px-6 lg:py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    document.querySelectorAll('.sidebar .nav-link').forEach(function(link) {
        link.addEventListener('click', function() { if (window.innerWidth < 1024) closeSidebar(); });
    });
    </script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
