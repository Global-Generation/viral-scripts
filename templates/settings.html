{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900 mb-1">Settings</h1>
    <p class="text-sm text-gray-500">Manage system prompts and view usage statistics</p>
</div>

<!-- Usage Stats -->
<div class="stat-card mb-4">
    <h2 class="text-sm font-semibold text-gray-700 mb-4">Usage Statistics</h2>
    <div id="usage-stats">
        <p class="text-sm text-gray-400">Loading...</p>
    </div>
</div>

<!-- System Prompts -->
<div class="stat-card mb-4">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-700">System Prompts</h2>
        <span class="text-xs text-gray-400">Click to expand, edit, and save</span>
    </div>
    <div id="prompts-container" class="space-y-2">
        <p class="text-sm text-gray-400">Loading...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadUsage() {
    const data = await api('/api/settings/usage');
    if (!data) return;
    const el = document.getElementById('usage-stats');

    let html = '<div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">';
    const platforms = ['higgsfield', 'anthropic', 'tavily'];
    const colors = { higgsfield: '#e6435b', anthropic: '#8B5CF6', tavily: '#3B82F6' };
    for (const p of platforms) {
        const count = data.by_platform[p] || 0;
        html += `<div class="border border-gray-100 rounded-lg p-4">
            <div class="text-xs font-medium text-gray-400 uppercase mb-1">${p}</div>
            <div class="text-2xl font-bold" style="color: ${colors[p]}">${count}</div>
            <div class="text-xs text-gray-400">requests</div>
        </div>`;
    }
    html += '</div>';

    if (data.by_type.length > 0) {
        html += '<div class="mb-4"><h3 class="text-xs font-semibold text-gray-500 uppercase mb-2">By Type</h3>';
        html += '<div class="space-y-1">';
        for (const item of data.by_type) {
            html += `<div class="flex justify-between text-xs"><span class="text-gray-600">${item.platform} / ${item.type || 'unknown'}</span><span class="font-medium text-gray-900">${item.count}</span></div>`;
        }
        html += '</div></div>';
    }

    if (data.by_model.length > 0) {
        html += '<div><h3 class="text-xs font-semibold text-gray-500 uppercase mb-2">By Model</h3>';
        html += '<div class="space-y-1">';
        for (const item of data.by_model) {
            html += `<div class="flex justify-between text-xs"><span class="text-gray-600">${item.model}</span><span class="font-medium text-gray-900">${item.count}</span></div>`;
        }
        html += '</div></div>';
    }

    if (data.total === 0) {
        html = '<p class="text-sm text-gray-400">No API usage recorded yet.</p>';
    }

    el.innerHTML = html;
}

async function loadPrompts() {
    const data = await api('/api/settings/prompts');
    if (!data) return;
    const el = document.getElementById('prompts-container');
    el.innerHTML = data.map(p => `
        <div style="border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;">
            <div onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'"
                 style="padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #f9fafb;">
                <span style="font-size: 12px; font-weight: 600; color: #374151;">${p.label}</span>
                <div style="display: flex; align-items: center; gap: 6px;">
                    ${p.is_custom ? '<span style="font-size: 9px; background: #dbeafe; color: #2563eb; padding: 1px 6px; border-radius: 4px; font-weight: 600;">Custom</span>' : ''}
                    <span style="font-size: 10px; color: #9ca3af;">▼</span>
                </div>
            </div>
            <div style="display: none; padding: 12px;">
                <textarea id="prompt-${p.key}" style="width: 100%; min-height: 160px; font-size: 11px; font-family: monospace; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; resize: vertical; line-height: 1.4;">${p.value.replace(/</g, '&lt;')}</textarea>
                <div style="display: flex; gap: 6px; margin-top: 8px;">
                    <button class="btn-sm btn-primary" onclick="savePrompt('${p.key}')">Save</button>
                    ${p.is_custom ? `<button class="btn-sm btn-secondary" onclick="resetPrompt('${p.key}')">Reset to Default</button>` : ''}
                </div>
            </div>
        </div>
    `).join('');
}

async function savePrompt(key) {
    const value = document.getElementById('prompt-' + key).value;
    const result = await api('/api/settings/prompts/' + key, 'PUT', { value });
    if (result && result.ok) {
        toast('Prompt saved', 'success');
        loadPrompts();
    }
}

async function resetPrompt(key) {
    if (!confirm('Reset this prompt to the default?')) return;
    const result = await api('/api/settings/prompts/' + key, 'DELETE');
    if (result && result.ok) {
        toast('Reset to default', 'success');
        loadPrompts();
    }
}

document.addEventListener('DOMContentLoaded', () => { loadUsage(); loadPrompts(); });
</script>
{% endblock %}
