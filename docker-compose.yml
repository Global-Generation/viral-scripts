version: "3.9"
services:
  analyzer:
    build: .
    container_name: viral-scripts
    ports:
      - "8070:8070"
    volumes:
      - viral_data:/app/data
      - viral_downloads:/app/downloads
      - whisper_cache:/root/.cache/whisper
    env_file:
      - .env
    restart: unless-stopped

volumes:
  viral_data:
  viral_downloads:
  whisper_cache:
