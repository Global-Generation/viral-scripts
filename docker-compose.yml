services:
  analyzer:
    build: .
    container_name: viral-scripts
    ports:
      - "8070:8070"
    volumes:
      - /home/deploy/viral-data/db:/app/data
      - /home/deploy/viral-data/downloads:/app/downloads
      - /home/deploy/viral-data/photos:/app/static/photos
      - whisper_cache:/root/.cache/whisper
    env_file:
      - .env
    restart: unless-stopped

volumes:
  whisper_cache:
