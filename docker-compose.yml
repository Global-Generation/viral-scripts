version: "3.9"
services:
  analyzer:
    build: .
    container_name: viral-scripts
    ports:
      - "8070:8070"
    volumes:
      - ./analyzer.db:/app/analyzer.db
      - ./downloads:/app/downloads
      - whisper_cache:/root/.cache/whisper
    env_file:
      - .env
    restart: unless-stopped

volumes:
  whisper_cache:
